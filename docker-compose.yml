services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv/web
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - frontend

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-24h}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-168h}
      - AWS_REGION=${AWS_REGION:-ap-southeast-3}
      - BEDROCK_MODEL=${BEDROCK_MODEL}
      - MAX_CLAW_SLOTS=${MAX_CLAW_SLOTS:-3}
      - BOOKING_TIMEOUT=${BOOKING_TIMEOUT:-600}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - clawnet

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-clawtiket}
      - POSTGRES_USER=${POSTGRES_USER:-claw}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-claw}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claw}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  claw-1:
    build: ./claw
    restart: unless-stopped
    environment:
      - SLOT_NUMBER=1
      - AWS_PROFILE=default
      - AWS_REGION=${AWS_REGION:-ap-southeast-3}
      - OPENCLAW_DISABLE_BONJOUR=1
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 1G
    networks:
      - clawnet

  claw-2:
    build: ./claw
    restart: unless-stopped
    environment:
      - SLOT_NUMBER=2
      - AWS_PROFILE=default
      - AWS_REGION=${AWS_REGION:-ap-southeast-3}
      - OPENCLAW_DISABLE_BONJOUR=1
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 1G
    networks:
      - clawnet

  claw-3:
    build: ./claw
    restart: unless-stopped
    environment:
      - SLOT_NUMBER=3
      - AWS_PROFILE=default
      - AWS_REGION=${AWS_REGION:-ap-southeast-3}
      - OPENCLAW_DISABLE_BONJOUR=1
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 1G
    networks:
      - clawnet

networks:
  frontend:
  backend:
  clawnet:

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
