name: Deploy to EC2 Jakarta

on:
  push:
    branches: [main]

env:
  INSTANCE_ID: i-0e94bb4c8c397c80f
  AWS_REGION: ap-southeast-3

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM (zero downtime)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /home/ubuntu/openclaw-tiket && git pull && docker compose up -d --build api --no-deps && cd frontend && docker run --rm -v $(pwd):/app -w /app node:20-alpine sh -c \"npm ci && npm run build\" && docker restart openclaw-tiket-caddy-1 && echo DEPLOY_SUCCESS"]}' \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Wait for completion
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deploy timed out"
          exit 1

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s --max-time 10 https://apaaja.pastibisa.app/api/health | python3 -c "import sys,json;print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "failed")
          if [ "$STATUS" = "ok" ]; then
            echo "Health check passed!"
          else
            echo "Health check failed: $STATUS"
            exit 1
          fi
